<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SDCheck の紹介 - SDCheck</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- ⭐ Menu template -->
    <div id="menu"></div>

    <h1>SDCheck の紹介</h1>

    <p>SDCheck は、構造図面のチェック作業を効率化するために開発された支援ソフトです。</p>
    <p>各種計算ソフトから出力されたデータと図面情報を照合し、チェック作業の精度向上と作業時間の短縮をサポートします。</p>
    <p>構造エンジニアの日常業務における確認作業をより簡単・確実にすることを目的としています。</p>

    <p><a href="index.html">← ホームページに戻る</a></p>

    <script>
        // ⭐ Load menu template
        fetch("menu.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;

                // Sau khi menu được load → xử lý Login/Logout
                const loggedIn = localStorage.getItem("loggedIn");

                if (loggedIn === "true") {
                    document.getElementById("loginLink").style.display = "none";
                    document.getElementById("logoutLink").style.display = "inline";
                } else {
                    document.getElementById("loginLink").style.display = "inline";
                    document.getElementById("logoutLink").style.display = "none";
                }
            });

        // ⭐ Lưu trang hiện tại trước khi login
        function savePage() {
            localStorage.setItem("returnPage", window.location.href);
        }

        // ⭐ Logout
        function logout() {
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("username");
            localStorage.removeItem("returnPage");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
