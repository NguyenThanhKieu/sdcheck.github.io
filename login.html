<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - SDCheck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ログイン</h1>

    <p>ダウンロードするにはログインが必要です。</p>

    <form onsubmit="login(); return false;">
        <label>ユーザー名：</label><br>
        <input type="text" id="username" required><br><br>

        <label>パスワード：</label><br>
        <input type="password" id="password" required><br><br>

        <button type="submit">ログイン</button>
    </form>

    <p id="error" style="color:red;"></p>

    <script>
        function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // Danh sách tài khoản hợp lệ
            const validUsers = [
                { username: "admin", password: "123456" },
                { username: "kieu", password: "sdcheck" }
            ];

            // Kiểm tra user/pass
            const found = validUsers.find(u => u.username === user && u.password === pass);

            if (found) {
                // Lưu trạng thái đăng nhập
                localStorage.setItem("loggedIn", "true");

                // Quay lại trang download
                window.location.href = "download.html";
            } else {
                document.getElementById("error").textContent = "ユーザー名またはパスワードが正しくありません。";
            }
        }
    </script>

</body>
</html>
