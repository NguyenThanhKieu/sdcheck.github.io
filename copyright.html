<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>著作権及び使用条件 - SDCheck</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- ⭐ Menu template -->
    <div id="menu"></div>

    <h1>著作権及び使用条件</h1>

    <p>SDCheck の著作権は Nguyen Thanh Kieu に帰属します。</p>
    <p>本ソフトウェアの無断転載、再配布、改変は禁止されています。</p>
    <p>本ソフトウェアの使用は、利用者自身の責任において行ってください。</p>

    <p><a href="index.html">← ホームページに戻る</a></p>

    <script>
        // ⭐ Load menu template
        fetch("menu.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;

                // Sau khi menu được load → xử lý Login/Logout
                const loggedIn = localStorage.getItem("loggedIn");

                if (loggedIn === "true") {
                    document.getElementById("loginLink").style.display = "none";
                    document.getElementById("logoutLink").style.display = "inline";
                } else {
                    document.getElementById("loginLink").style.display = "inline";
                    document.getElementById("logoutLink").style.display = "none";
                }
            });

        // ⭐ Lưu trang hiện tại trước khi login
        function savePage() {
            localStorage.setItem("returnPage", window.location.href);
        }

        // ⭐ Logout
        function logout() {
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("username");
            localStorage.removeItem("returnPage");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
