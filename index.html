<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SDCheck - 構造図面チェック支援ソフト</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- ⭐ Menu template -->
    <div id="menu"></div>

    <h1>SDCheck ホームページへようこそ</h1>
    <p>SDCheck は、各種計算ソフトと連携して構造図面をチェックするための支援ソフトです。</p>

    <section class="intro">
        <h2><a href="intro.html">SDCheck の紹介</a></h2>
    </section>

    <section class="manual">
        <h2><a href="manual.html">使用方法</a></h2>
    </section>

    <section class="download-page">
        <h2><a href="download.html">ダウンロードページ</a></h2>
    </section>

    <section class="license">
        <h2><a href="copyright.html">著作権及び使用条件</a></h2>
    </section>

    <footer>
        <p>SDCheck Copyright (C)2025-2026 Nguyen Thanh Kieu</p>
    </footer>

    <script>
        // ⭐ Load menu template
        fetch("menu.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;

                // Sau khi menu được load → xử lý Login/Logout
                const loggedIn = localStorage.getItem("loggedIn");

                if (loggedIn === "true") {
                    document.getElementById("loginLink").style.display = "none";
                    document.getElementById("logoutLink").style.display = "inline";
                } else {
                    document.getElementById("loginLink").style.display = "inline";
                    document.getElementById("logoutLink").style.display = "none";
                }
            });

        // ⭐ Lưu trang hiện tại trước khi login
        function savePage() {
            localStorage.setItem("returnPage", window.location.href);
        }

        // ⭐ Logout
        function logout() {
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("username");
            localStorage.removeItem("returnPage");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
