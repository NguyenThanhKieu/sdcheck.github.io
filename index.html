<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SDCheck - 構造図面チェック支援ソフト</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- Thanh menu -->
    <div class="navbar">
        <a href="index.html">ホーム</a>
        <a href="intro.html">紹介</a>
        <a href="manual.html">使用方法</a>
        <a href="download.html">ダウンロード</a>
        <a href="copyright.html">著作権</a>

        <span class="navbar-right">
            <a href="login.html" id="loginLink">ログイン</a>
            <a href="#" onclick="logout()" id="logoutLink" style="display:none;">ログアウト</a>
        </span>
    </div>

    <h1>SDCheck ホームページへようこそ</h1>
    <p>SDCheck は、各種計算ソフトと連携して構造図面をチェックするための支援ソフトです。</p>

    <section class="intro">
        <h2><a href="intro.html">SDCheck の紹介</a></h2>
    </section>

    <section class="manual">

    <section class="download-page">

    <footer>

    </footer>

    <script>
        const loggedIn = localStorage.getItem("loggedIn");

        if (loggedIn === "true") {
            document.getElementById("loginLink").style.display = "none";
            document.getElementById("logoutLink").style.display = "inline";
        } else {
            document.getElementById("loginLink").style.display = "inline";
            document.getElementById("logoutLink").style.display = "none";
        }

        function logout() {
            localStorage.removeItem("loggedIn");
            window.location.href = "index.html";
        }
    </script>
