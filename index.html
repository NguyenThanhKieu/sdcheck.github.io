<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダウンロード - SDCheck</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Thanh menu */
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- Thanh menu -->
    <div class="navbar">
        <a href="index.html">ホーム</a>
        <a href="intro.html">紹介</a>
        <a href="manual.html">使用方法</a>
        <a href="download.html">ダウンロード</a>
        <a href="copyright.html">著作権</a>

        <span class="navbar-right">
            <a href="login.html" id="loginLink">ログイン</a>
            <a href="#" onclick="logout()" id="logoutLink" style="display:none;">ログアウト</a>
        </span>
    </div>

    <h1>SDCheck ダウンロード</h1>

    <p>以下のリンクから SDCheck のセットアップファイルをダウンロードできます。</p>

    <h2>最新版ダウンロード</h2>
    <p>
        <a href="#" onclick="checkLogin()" class="btn">
            SDCheckSetup.exe をダウンロード
        </a>
    </p>

    <h2>注意事項</h2>
    <ul>
        <li>Windows 専用ソフトです。</li>
        <li>インストール時に警告が表示される場合がありますが、発行元を確認して続行してください。</li>
        <li>ダウンロードおよび使用は自己責任で行ってください。</li>
    </ul>

    <p><a href="index.html">← ホームページに戻る</a></p>

    <script>
        // Kiểm tra trạng thái đăng nhập để hiển thị Login hoặc Logout
        const loggedIn = localStorage.getItem("loggedIn");

        if (loggedIn === "true") {
            document.getElementById("loginLink").style.display = "none";
            document.getElementById("logoutLink").style.display = "inline";
        } else {
            document.getElementById("loginLink").style.display = "inline";
            document.getElementById("logoutLink").style.display = "none";
        }

        function logout() {
            localStorage.removeItem("loggedIn");
            window.location.href = "index.html";
        }

        function checkLogin() {
            if (localStorage.getItem("loggedIn") === "true") {
                window.location.href = "downloads/SDCheckSetup.exe";
            } else {
                window.location.href = "login.html";
            }
        }
    </script>

</body>
</html>
